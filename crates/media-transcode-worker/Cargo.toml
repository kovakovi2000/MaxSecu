[package]
name = "maxsecu-media-transcode-worker"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
description = "MaxSecu author-side ingest/transcode worker: pure-Rust rav1e AV1 encode + hand-rolled CMAF mux, with ac-ffmpeg decode behind the off-by-default `ffmpeg` feature (the sole C carve-out)."

[lib]
name = "maxsecu_media_transcode_worker"
path = "src/lib.rs"

# The transcode worker: a secret-less, network-less process that reads a framed
# canonical-source `TranscodeRequest` on stdin and writes a framed
# `TranscodeResult` on stdout (one job per process â€” the same one-shot, confined
# shape as the decode `media-worker`). Spawned by `media-launcher::TranscodeLauncher`.
[[bin]]
name = "media-transcode-worker"
path = "src/main.rs"

[dependencies]
# The transcode TYPES + the framed, bounds-safe wire codec
# (`TranscodeRequest`/`TranscodeResult`/`FragmentEntry`,
# `encode/decode_transcode_*`). C-free; this is the TCB-owned contract the launcher
# and this worker agree on byte-for-byte.
maxsecu-client-core = { path = "../client-core" }

# `rav1e` â€” pure-Rust AV1 *encoder*: the ALWAYS-ON canonical encoder for the
# transcode output (Task 6.2 wires the real encode + CMAF mux). asm OFF (no nasm)
# keeps it zero-C. Non-optional: the default (no-ffmpeg) build is the pure-Rust path.
rav1e = { version = "0.8.1", default-features = false }

# `ac-ffmpeg` â€” the SOLE C link in the whole workspace, the author-side ingest
# decoder. OPTIONAL and OFF by default: the committed/tested path never links C.
# Gated behind the `ffmpeg` feature (Task 6.2 fills in the FFI decode front-end);
# enabling it requires a provisioned FFmpeg <= 7.x dev lib on the host. This is the
# ONLY crate in the workspace permitted to depend on `ac-ffmpeg`.
ac-ffmpeg = { version = "0.19.0", default-features = false, optional = true }

# ---- DEV-ONLY verification deps (Task 6.2) ----
# These are the VIEW-path decoders + the image crate, used ONLY by the integration
# tests to PROVE the transcode output is genuinely canonical: each chunk-aligned
# fragment demuxes (symphonia) + decodes (rav1d) back to the source dimensions, and
# the thumbnail/preview are valid PNGs. Dev-deps do NOT propagate, so they stay OUT of
# the worker's normal/shipped graph (the NORMAL deps remain client-core + rav1e, plus
# the optional ac-ffmpeg). asm OFF on rav1d (no nasm) keeps the test path zero-C.
[dev-dependencies]
# `maxsecu-media-launcher` â€” the CODEC-FREE confined spawner (Gate 6). DEV-ONLY: the
# containment test drives the real `TranscodeLauncher` (AppContainer + Job Object on
# Windows) for the confined functional + differential-containment proofs. It links NO
# codec (rav1e/ac-ffmpeg live only here), depends only on client-core + windows-sys,
# and does NOT depend on this worker crate â€” so this is a pure leaf dev-edge, no cycle,
# and (being a dev-dep) never enters the worker's NORMAL/shipped graph.
maxsecu-media-launcher = { path = "../media-launcher" }
# `rav1d` â€” pure-Rust dav1d port; decodes the muxed fragment's av01 sample back to
# its geometry (the dav1d C ABI is exposed as `pub unsafe extern "C"` fns, so the
# test's FFI decode is the ONE `#[allow(unsafe_code)]` site â€” scoped + justified).
rav1d = { version = "1.1.0", default-features = false, features = [
    "bitdepth_8",
    "bitdepth_16",
] }
# `symphonia` â€” pure-Rust ISO-BMFF demux: reads each fragment's av01 sample + geometry
# back out of the (padded) MP4, proving the trailing `free`-box padding is tolerated.
symphonia = { version = "0.6.0", default-features = false, features = [
    "isomp4",
    "aac",
] }
# `image` â€” validates the thumbnail/preview are real, in-bounds PNGs.
image = { version = "0.25", default-features = false, features = ["png", "jpeg"] }

[features]
# DEFAULT = NO ffmpeg: the pure-Rust rav1e + CMAF path only â€” no unsupported-ABI C
# in the committed/tested build.
default = []
# Opt-in C ingest carve-out. Pulls `ac-ffmpeg` (and its C link) into THIS crate
# only; never reaches client-core / media-launcher / client-app / media-worker.
ffmpeg = ["dep:ac-ffmpeg"]

[lints.rust]
# `unsafe` is DENIED crate-wide and re-allowed ONLY at the contained, audited
# `ac-ffmpeg` FFI sites under `#[cfg(feature = "ffmpeg")]` (Task 6.2). With the
# feature OFF (default) there is no unsafe at all â€” the pure-Rust path stays clean.
unsafe_code = "deny"
