<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>MaxSecu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light dark;
        --fg: #111;
        --bg: #fff;
        --accent: #0b57d0;
        --muted: #555;
        --border: #999;
        --err: #b3261e;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --fg: #eee;
          --bg: #1a1a1a;
          --accent: #8ab4f8;
          --muted: #bbb;
          --border: #777;
          --err: #f2b8b5;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 16px/1.5 system-ui, sans-serif;
        color: var(--fg);
        background: var(--bg);
      }
      /* Skip link: visually hidden until focused, then visible. */
      .skip-link {
        position: absolute;
        left: 0;
        top: 0;
        transform: translateY(-120%);
        padding: 0.5rem 1rem;
        /* Fixed high-contrast pair, independent of --accent, so contrast holds
           in both light and dark schemes (#fff on #0b57d0 ~= 6.4:1). */
        background: #0b57d0;
        color: #fff;
        text-decoration: none;
        z-index: 100;
        transition: transform 0.1s ease;
      }
      .skip-link:focus {
        transform: translateY(0);
      }
      /* Visible focus for all interactive elements (WCAG 2.4.7). */
      a:focus-visible,
      button:focus-visible,
      input:focus-visible,
      [tabindex]:focus-visible {
        outline: 3px solid var(--accent);
        outline-offset: 2px;
      }
      header[role="banner"] {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        align-items: center;
        justify-content: space-between;
        padding: 0.75rem 1rem;
        border-bottom: 1px solid var(--border);
      }
      nav[role="navigation"] a,
      nav[role="navigation"] span {
        margin-right: 0.25rem;
      }
      nav[role="navigation"] span {
        color: var(--muted);
      }
      main {
        padding: 1rem;
        max-width: 40rem;
      }
      form label {
        display: block;
        margin: 0.75rem 0;
      }
      form input[type="text"],
      form input[type="password"],
      form input:not([type]) {
        display: block;
        width: 100%;
        padding: 0.5rem;
        margin-top: 0.25rem;
        font: inherit;
        color: var(--fg);
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 4px;
      }
      button {
        font: inherit;
        padding: 0.5rem 1rem;
        cursor: pointer;
      }
      status-pill {
        display: inline-block;
        white-space: nowrap;
        font-size: 0.9rem;
        color: var(--muted);
      }
      [role="alert"] {
        color: var(--err);
        font-weight: 600;
        min-height: 1.5em;
      }
    </style>
  </head>
  <body>
    <a href="#main" class="skip-link">Skip to content</a>
    <app-shell></app-shell>
    <script type="module" src="./main.js"></script>
  </body>
</html>
