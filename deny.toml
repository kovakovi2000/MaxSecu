# cargo-deny configuration (stack.md §1.3 "pin and audit"; DESIGN §8 supply chain).
# Run: cargo deny check
#
# The crypto/encoding crates are the system's TCB, so the dependency graph is
# held to a tight, audited set. Tighten — never loosen — without review.

[graph]
all-features = true

[advisories]
# Fail on any RUSTSEC advisory for a dependency we actually use.
version = 2
yanked = "deny"
# Only ever add an advisory id here with a written justification.
ignore = [
    # RUSTSEC-2023-0071 — "Marvin Attack" RSA timing sidechannel (medium, NO
    # upstream fix exists). `rsa` is a transitive *lockfile* entry of
    # `sqlx-postgres` but is NOT in our build graph — `cargo tree -i rsa
    # -e normal,build` prints nothing, i.e. the vulnerable code is never
    # compiled or linked into the server (our sqlx features don't activate the
    # RSA password-auth path; the server↔Postgres link is loopback SCRAM/trust).
    # Re-audit when sqlx drops `rsa` or a fixed `rsa` ships, then remove this.
    "RUSTSEC-2023-0071",
]

[bans]
multiple-versions = "warn" # transitive duplicates are noise, not yet a hard fail
wildcards = "deny"
# Internal `{ path = "../…" }` deps carry no version and read as wildcards; allow
# those (they are first-party), while still denying wildcard *registry* deps.
allow-wildcard-paths = true
# Disallow pulling in a second crypto stack by accident. The app-layer TCB is
# RustCrypto + dalek (stack.md §1.3). The ONE sanctioned non-RustCrypto crypto
# crate is `aws-lc-rs`, admitted deliberately as the rustls TLS provider only
# (transport, not the zero-knowledge boundary — see stack.md §1.3 provider note);
# it is intentionally NOT listed below. `ring`/`openssl` remain banned so a
# *second* such stack cannot slip in unnoticed (e.g. via a backend default —
# rcgen must use its `aws_lc_rs` feature, not `ring`).
deny = [
    { name = "openssl" },
    { name = "openssl-sys" },
    { name = "ring" },
]

[licenses]
version = 2
# Our own crates are publish=false and carry no license field yet — skip them
# (set a license before any crate is ever published).
private = { ignore = true }
# Permissive licenses only; the dependency set is RustCrypto + dalek + std-ish.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
]
confidence-threshold = 0.9

[sources]
unknown-registry = "deny"
unknown-git = "deny"
# Only crates.io. No git or alternate-registry dependencies in the TCB.
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
