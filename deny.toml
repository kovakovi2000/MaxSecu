# cargo-deny configuration (stack.md §1.3 "pin and audit"; DESIGN §8 supply chain).
# Run: cargo deny check
#
# The crypto/encoding crates are the system's TCB, so the dependency graph is
# held to a tight, audited set. Tighten — never loosen — without review.

[graph]
all-features = true

[advisories]
# Fail on any RUSTSEC advisory for a dependency we actually use.
version = 2
yanked = "deny"
# Only ever add an advisory id here with a written justification.
# The client (Tauri + arti/Tor) is now its OWN cargo workspace with its OWN
# deny.toml (crates/client-app/deny.toml), so every advisory ignore that used to be
# needed here for the Tauri desktop-client tree (gtk-rs, unic-*, proc-macro-error),
# the arti tree (rsa via tor-keymgr, paste, quick-xml), and the AV1 codec crates
# lives THERE. This (server) workspace's resolved graph currently triggers NO
# RUSTSEC advisories, so the ignore list is empty. Add an id here ONLY with a
# written justification, and only for a crate actually in THIS workspace's graph.
ignore = []

[bans]
multiple-versions = "warn" # transitive duplicates are noise, not yet a hard fail
wildcards = "deny"
# Internal `{ path = "../…" }` deps carry no version and read as wildcards; allow
# those (they are first-party), while still denying wildcard *registry* deps.
allow-wildcard-paths = true
# Disallow pulling in a second crypto stack by accident. The app-layer TCB is
# RustCrypto + dalek (stack.md §1.3). The ONE sanctioned non-RustCrypto crypto
# crate is `aws-lc-rs`, admitted deliberately as the rustls TLS provider only
# (transport, not the zero-knowledge boundary — see stack.md §1.3 provider note);
# it is intentionally NOT listed below. `ring`/`openssl` remain banned so a
# *second* such stack cannot slip in unnoticed (e.g. via a backend default —
# rcgen must use its `aws_lc_rs` feature, not `ring`).
# Phase 7 note: the codec view-path (rav1d/rav1e/symphonia) is pure Rust (zero C).
# The sole NEW C link is `ac-ffmpeg` (+ build helpers `ac-ffmpeg-build` /
# `ac-ffmpeg-features`), the author-side ingest carve-out — NOT a crypto stack, so
# it is not (and need not be) listed here. It is confined to ONE crate: reachable
# only via the `ffmpeg` feature (OFF by default) of `crates/media-transcode-worker`,
# the sole C carve-out leaf (`cargo tree -i ac-ffmpeg` reaches only that crate, and
# only under the feature; it is absent from the default build graph entirely).
# `aws-lc-rs` stays the only sanctioned crypto C; `ring`/`openssl` remain banned and
# absent from the lockfile.
deny = [
    { name = "openssl" },
    { name = "openssl-sys" },
    { name = "ring" },
]

[licenses]
version = 2
# Our own crates are publish=false and carry no license field yet — skip them
# (set a license before any crate is ever published).
private = { ignore = true }
# Permissive licenses only; the dependency set is RustCrypto + dalek + std-ish.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    # (Unicode-DFS-2016, MPL-2.0 and NCSA moved to crates/client-app/deny.toml with
    # the workspace split — they were required only by the Tauri client tree
    # (MPL: cssparser/selectors/option-ext) and the AV1 codec crates (NCSA:
    # libfuzzer-sys via rav1e), none of which are in THIS server workspace's graph.)
    # CDLA-Permissive-2.0 — the Community Data License Agreement, Permissive
    # variant: a permissive *data* license (attribution/no-copyleft, commercial
    # use and redistribution allowed), used because `webpki-roots`' payload is
    # data (the Mozilla CA root-cert bundle), not code. Required by two crates:
    # `webpki-roots` in `crates/server` (`dropbox_tier` — the real Dropbox
    # cold-tier adapter needs the public WebPKI root set to verify
    # api.dropboxapi.com / content.dropboxapi.com, unlike the sink/app-server
    # transports which pin a private cert) and `webpki-roots` in `crates/client-app`
    # (`direct_link` — the client's direct-link download route fetches the
    # server-brokered cloud URL, e.g. Dropbox's public `dl.dropboxusercontent.com`,
    # which likewise needs the public root set rather than the pinned server cert).
    # `cargo tree -i webpki-roots` shows only `rustls-pki-types` beneath it — no C,
    # no `ring`. Remove if both drop direct cloud egress or switch to
    # `rustls-native-certs`.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[sources]
unknown-registry = "deny"
unknown-git = "deny"
# Only crates.io. No git or alternate-registry dependencies in the TCB.
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
